<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Traffic Monitoring Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --success-color: #4ade80;
            --danger-color: #f87171;
            --warning-color: #fbbf24;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 15px;
        }
        header h1 {
            margin: 0;
            color: var(--accent-color);
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dashboard-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }
        .panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.15rem;
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        input[type="file"], select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: var(--text-color);
            box-sizing: border-box;
            outline: none;
        }
        input[type="file"]::file-selector-button {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid #475569;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            margin-top: 5px;
        }
        button:hover {
            background-color: #0284c7;
            transform: translateY(-1px);
        }
        button:disabled {
            background-color: #64748b;
            cursor: not-allowed;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            font-size: 0.95rem;
            color: #94a3b8;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .value-vehicles { color: var(--success-color); }
        .value-speed { color: var(--accent-color); }
        .value-reverse { color: var(--danger-color); }
        .value-red { color: var(--warning-color); }
        .value-plate { 
            color: #e2e8f0; 
            background: #0f172a; 
            padding: 2px 10px; 
            border-radius: 4px; 
            border: 1px solid #475569; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1.1rem;
        }
        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--card-bg);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            min-height: 550px;
            position: relative; 
        }
        .video-container img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }
       
        #controlsOverlay {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            display: none;
        }
        .overlay-box {
            background: rgba(15, 23, 42, 0.85);
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            border: 1px solid #334155;
        }
        .overlay-btn {
            width: auto;
            margin: 0 5px;
            padding: 8px 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hệ Thống Giám Sát Giao Thông Thông Minh (AI Traffic Monitoring)</h1>
        </header>

        <div class="dashboard-layout">
            <div class="panel">
                <div class="card">
                    <h2>Cấu Hình Hệ Thống</h2>
                    <form id="uploadForm" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="videoFile">Chọn File Video</label>
                            <input type="file" id="videoFile" accept="video/*" required>
                        </div>
                        <div class="form-group">
                            <label for="modeSelect">Chế Độ Phân Tích</label>
                            <select id="modeSelect">
                                <option value="count">Đếm xe & Phát hiện ngược chiều</option>
                                <option value="speed">Đo tốc độ phương tiện</option>
                            </select>
                        </div>
                        <button type="submit" id="mainUploadBtn">Tải Lên & Thiết Lập</button>
                    </form>
                </div>

                <div class="card">
                    <h2>Chỉ Số Thời Gian Thực</h2>
                    <div class="stat-item">
                        <span class="stat-label">Tổng số phương tiện:</span>
                        <span class="stat-value value-vehicles" id="v">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Tốc độ trung bình:</span>
                        <span class="stat-value value-speed" id="s">0 km/h</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Vi phạm ngược chiều:</span>
                        <span class="stat-value value-reverse" id="re">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Vi phạm đèn đỏ:</span>
                        <span class="stat-value value-red" id="r">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Biển số gần nhất:</span>
                        <span class="stat-value value-plate" id="p">---</span>
                    </div>
                </div>
            </div>

            <div class="video-container">
                <canvas id="setupCanvas" style="display: none; width: 100%; max-height: 720px; cursor: crosshair;"></canvas>
                
                <img id="videoStream" src="" alt="AI Video Stream" style="display: none;">
                
                <div id="controlsOverlay">
                    <div class="overlay-box">
                        <span id="instructionText" style="color: #38bdf8; font-weight: bold; margin-right: 15px;">Hãy click chọn 4 điểm trên khung hình...</span>
                        <button type="button" class="overlay-btn" id="clearBtn" style="background: #f87171;">Làm Lại</button>
                        <button type="button" class="overlay-btn" id="startAiBtn" style="background: #4ade80; color: #0f172a;" disabled>Chạy AI</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById("uploadForm");
        const modeSelect = document.getElementById("modeSelect");
        const videoStream = document.getElementById("videoStream");
        const mainUploadBtn = document.getElementById("mainUploadBtn");

        const setupCanvas = document.getElementById("setupCanvas");
        const controlsOverlay = document.getElementById("controlsOverlay");
        const instructionText = document.getElementById("instructionText");
        const clearBtn = document.getElementById("clearBtn");
        const startAiBtn = document.getElementById("startAiBtn");

        let ctx = setupCanvas.getContext("2d");
        let points = [];
        let origWidth = 0;
        let origHeight = 0;
        let bgImage = new Image();
        let isStreaming = false; 

        modeSelect.addEventListener("change", () => {
            if (isStreaming) {
                videoStream.src = `/video_feed?mode=${modeSelect.value}&t=${new Date().getTime()}`;
            } else {
                clearCanvas();
                updateInstruction();
            }
        });

        function clearCanvas() {
            points = [];
            if (origWidth > 0 && origHeight > 0) {
                ctx.clearRect(0, 0, setupCanvas.width, setupCanvas.height);
                ctx.drawImage(bgImage, 0, 0, origWidth, origHeight);
            }
            updateInstruction();
        }
        clearBtn.addEventListener("click", clearCanvas);

        function updateInstruction() {
            const mode = modeSelect.value;
            if (mode === "count") {
                instructionText.innerText = `Đếm Xe: Chọn ${points.length}/4 điểm (2 điểm đường phân làn, 2 điểm vạch đếm)`;
            } else {
                instructionText.innerText = `Đo Tốc Độ: Chọn ${points.length}/4 điểm (Vẽ vùng Polygon góc quay)`;
            }
            
            startAiBtn.disabled = points.length < 4;
            if (points.length === 4) {
                instructionText.innerText = "Tuyệt vời! Đã lấy đủ tọa độ. Hãy bấm Chạy AI.";
                instructionText.style.color = "#4ade80";
            } else {
                instructionText.style.color = "#38bdf8";
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById("videoFile");
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            const originalText = mainUploadBtn.innerText;
            mainUploadBtn.innerText = "Đang trích xuất...";
            mainUploadBtn.disabled = true;

            try {
                const response = await fetch("/upload", { method: "POST", body: formData });
                if (response.ok) {
                    const data = await response.json();
                    
                    origWidth = data.width;
                    origHeight = data.height;
                    setupCanvas.width = origWidth;
                    setupCanvas.height = origHeight;
                    
                    isStreaming = false;
                    videoStream.style.display = "none";
                    setupCanvas.style.display = "block";
                    controlsOverlay.style.display = "block";
                    
                    bgImage.src = data.frame_url + "?t=" + new Date().getTime();
                    bgImage.onload = () => {
                        clearCanvas();
                    };
                } else {
                    alert("Lỗi khi tải video lên server.");
                }
            } catch (err) {
                console.error("Upload error:", err);
                alert("Mất kết nối với Backend.");
            } finally {
                mainUploadBtn.innerText = originalText;
                mainUploadBtn.disabled = false;
            }
        });

        setupCanvas.addEventListener("mousedown", (e) => {
            if (points.length >= 4) return;
            
            const rect = setupCanvas.getBoundingClientRect();
            const scaleX = setupCanvas.width / rect.width;
            const scaleY = setupCanvas.height / rect.height;
            
            const realX = Math.round((e.clientX - rect.left) * scaleX);
            const realY = Math.round((e.clientY - rect.top) * scaleY);
            
            points.push([realX, realY]);
            
            ctx.beginPath();
            ctx.arc(realX, realY, 8, 0, 2 * Math.PI);
            ctx.fillStyle = "#f87171";
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#ffffff";
            ctx.stroke();

            if (points.length > 1) {
                ctx.beginPath();
                ctx.moveTo(points[points.length - 2][0], points[points.length - 2][1]);
                ctx.lineTo(realX, realY);
                ctx.strokeStyle = "#fbbf24";
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            updateInstruction();
        });

        startAiBtn.addEventListener("click", async () => {
            const currentMode = modeSelect.value;
            
            await fetch("/set_config", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mode: currentMode, coords: points })
            });

            setupCanvas.style.display = "none";
            controlsOverlay.style.display = "none";
            videoStream.style.display = "block";
            isStreaming = true;
            
            videoStream.src = `/video_feed?mode=${currentMode}&t=${new Date().getTime()}`;
        });

        async function fetchSystemStats() {
            try {
                const response = await fetch("/stats");
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("v").innerText = data.vehicles;
                    document.getElementById("s").innerText = `${data.speed} km/h`;
                    document.getElementById("r").innerText = data.red;
                    document.getElementById("re").innerText = data.reverse;
                    document.getElementById("p").innerText = data.plate;
                }
            } catch (err) {}
        }
        setInterval(fetchSystemStats, 1000);
        fetchSystemStats();
    </script>
</body>
</html>
