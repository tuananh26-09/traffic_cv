services:

  api:

    image: tuananh2026/traffic_dashboard_api:v1
    container_name: dashboard_api

    ports:
      - "8000:8000"

    volumes:
      - /mnt/d/project_test/test_cv:/src

    depends_on:
      - mysql

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
  mysql:

    image: mysql:8

    container_name: cv_db

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: traffic_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:

  mysql_data: